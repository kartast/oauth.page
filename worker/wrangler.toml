name = "oauth-page-worker"
main = "src/index.ts"
compatibility_date = "2024-06-20"
compatibility_flags = ["nodejs_compat"]

[vars]
APP_URL = "https://app.oauth.page"
BETA_ONE_TIME_LINKS = "true" # easy launch toggle: set to "false"
# Set these as secrets via `wrangler secret put`:
# GITHUB_CLIENT_ID
# GITHUB_CLIENT_SECRET
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# JWT_SECRET
# RESEND_API_KEY

[[d1_databases]]
binding = "DB"
database_name = "oauth-page-db"
database_id = "d3fe89b5-4259-45ea-b344-77d6c26cbe8a"
migrations_dir = "drizzle"

[[kv_namespaces]]
binding = "KV"
id = "b651495a73a04699a0d14cef9af8df2d"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "oauthpage-sites"

[browser]
binding = "BROWSER"

[[routes]]
pattern = "*.oauth.page/*"
zone_name = "oauth.page"

[[routes]]
pattern = "oauth.page/*"
zone_name = "oauth.page"

# Screenshot queue — decouples deploys from browser rendering
[[queues.producers]]
queue = "screenshot-jobs"
binding = "SCREENSHOT_QUEUE"

[[queues.consumers]]
queue = "screenshot-jobs"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "screenshot-dlq"
max_batch_timeout = 0
max_concurrency = 5

# ─── Staging Environment ───
[env.staging]
workers_dev = true
name = "oauth-page-worker-staging"

[env.staging.vars]
APP_URL = "https://staging.oauth-page-worker.workers.dev"
BETA_ONE_TIME_LINKS = "true"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "oauth-page-db-staging"
database_id = "3ed336e2-a6ba-4431-964e-61ba6548c37e"
migrations_dir = "drizzle"

[[env.staging.kv_namespaces]]
binding = "KV"
id = "fd499e7ac2a242f0949fcbd0e176d0b2"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "oauthpage-sites-staging"

[env.staging.browser]
binding = "BROWSER"

[[env.staging.queues.producers]]
queue = "screenshot-jobs-stg"
binding = "SCREENSHOT_QUEUE"

[[env.staging.queues.consumers]]
queue = "screenshot-jobs-stg"
max_batch_size = 1
max_retries = 3
dead_letter_queue = "screenshot-dlq-stg"
max_batch_timeout = 0
max_concurrency = 5


